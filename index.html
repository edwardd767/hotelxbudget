<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HotelX - HotelX Budget</title>
  <style>
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f3f3;
    }
    .loading {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #222;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div class="loading" id="pageLoader">Loading HotelX Budget...</div>
  <script>
    (async function loadHotelXBudget() {
      const repo = 'edwardd767/hotelxbudget';
      const baseBlobSha = 'f0d85942e0630f204ef27721c853b3fb4e8a0861';
      const blobApiUrl = `https://api.github.com/repos/${repo}/git/blobs/${baseBlobSha}`;

      const mobileFixCss = `
        <style id="mobile-sidebar-fix">
          .hamburger {
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
          }

          .sidebar-backdrop {
            display: none;
          }

          @media (max-width: 700px) {
            .topbar {
              z-index: 80 !important;
            }

            .sidebar {
              transform: translateX(-105%);
              transition: transform .25s ease;
              z-index: 70 !important;
              box-shadow: 4px 0 12px rgba(0,0,0,.24) !important;
            }

            .sidebar.mobile-open {
              transform: translateX(0) !important;
            }

            .sidebar-backdrop.show {
              display: block;
              position: fixed;
              top: var(--topbar);
              left: 0;
              right: 0;
              bottom: 0;
              background: rgba(0,0,0,.28);
              z-index: 60;
            }
          }
        </style>
      `;

      const mobileFixScript = `
        <script id="mobile-sidebar-fix-script">
          (function () {
            const hamburger = document.querySelector('.hamburger');
            const sidebar = document.querySelector('.sidebar');
            if (!hamburger || !sidebar) return;

            let backdrop = document.querySelector('.sidebar-backdrop');
            if (!backdrop) {
              backdrop = document.createElement('div');
              backdrop.className = 'sidebar-backdrop';
              document.body.insertBefore(backdrop, document.querySelector('.main'));
            }

            hamburger.setAttribute('role', 'button');
            hamburger.setAttribute('tabindex', '0');
            hamburger.setAttribute('aria-expanded', 'false');

            const isMobile = () => window.matchMedia('(max-width: 700px)').matches;

            function openMobileMenu() {
              if (!isMobile()) return;
              sidebar.classList.add('mobile-open');
              backdrop.classList.add('show');
              hamburger.setAttribute('aria-expanded', 'true');
              document.body.style.overflow = 'hidden';
            }

            function closeMobileMenu() {
              sidebar.classList.remove('mobile-open');
              backdrop.classList.remove('show');
              hamburger.setAttribute('aria-expanded', 'false');
              document.body.style.overflow = '';
            }

            function toggleMobileMenu(event) {
              if (event) event.stopPropagation();
              if (sidebar.classList.contains('mobile-open')) {
                closeMobileMenu();
              } else {
                openMobileMenu();
              }
            }

            hamburger.addEventListener('click', toggleMobileMenu);
            hamburger.addEventListener('keydown', function (event) {
              if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                toggleMobileMenu(event);
              }
            });

            backdrop.addEventListener('click', closeMobileMenu);

            ['budgetMenu', 'hotelSettingsMenu'].forEach(function (id) {
              const menu = document.getElementById(id);
              if (menu) menu.addEventListener('click', closeMobileMenu);
            });

            window.addEventListener('resize', function () {
              if (!isMobile()) closeMobileMenu();
            });
          })();
        <\/script>
      `;

      try {
        const cached = sessionStorage.getItem('hotelxbudget-base-' + baseBlobSha);
        let html = cached;

        if (!html) {
          const response = await fetch(blobApiUrl);
          if (!response.ok) throw new Error('Unable to load base HTML');
          const blob = await response.json();
          const base64 = String(blob.content || '').replace(/\n/g, '');
          const binary = atob(base64);
          const bytes = Uint8Array.from(binary, char => char.charCodeAt(0));
          html = new TextDecoder('utf-8').decode(bytes);
          sessionStorage.setItem('hotelxbudget-base-' + baseBlobSha, html);
        }

        html = html
          .replace('</head>', mobileFixCss + '\n</head>')
          .replace('</body>', mobileFixScript + '\n</body>');

        const pageLoader = document.getElementById('pageLoader');
        if (pageLoader) pageLoader.remove();

        document.open();
        document.write(html);
        document.close();
      } catch (error) {
        document.body.innerHTML = '<div class="loading">Unable to load the HotelX Budget page. Please refresh the page.</div>';
        console.error(error);
      }
    })();
  </script>
</body>
</html>
